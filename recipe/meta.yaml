{% set name = "dageo" %}
{% set version = "1.1.2" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dageo-{{ version }}.tar.gz
  sha256: 8d05fd981d876b6aee366cb8c63a6a5b33998a5a825c5ccc5d3d319175b13b31

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - scooby

test:
  imports:
    - dageo
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/tuda-geo/dageo
  summary: Data Assimilation in Geosciences.
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  doc_url: https://tuda-geo.github.io/dageo/

extra:
  recipe-maintainers:
    - prisae
    - gabrielserrao
